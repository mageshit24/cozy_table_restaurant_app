<div class="dashboard-container">

  <h2>Welcome {{ username || 'Customer' }} </h2>

  <div class="card-grid">

    <div class="card" (click)="goTo('/customer/menu')">
      View Menu
    </div>

    <div class="card" (click)="goTo('/customer/cart')">
      My Cart
    </div>

    <div class="card" (click)="goTo('/customer/orders')">
      My Orders
    </div>

    <div class="card" (click)="goTo('/customer/reservation')">
      Reservation
    </div>

    <div class="card" (click)="goTo('/customer/feedback')">
      Give Feedback
    </div>

  </div>

  <button class="logout-btn" (click)="logout()">
    Logout
  </button>

</div>
