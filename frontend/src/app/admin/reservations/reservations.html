<div class="admin-reservations">

  <h2>Manage Reservations</h2>

  <!-- =========================
       FILTERS
  ========================== -->

  <div class="filters">

    <label>
      Status:

      <select
        [(ngModel)]="filterStatus"
        name="filterStatus">

        <option value="">All</option>

        <option value="pending">
          Pending
        </option>

        <option value="confirmed">
          Confirmed
        </option>

        <option value="cancelled">
          Cancelled
        </option>

      </select>
    </label>

    <label>
      Date:

      <input
        type="date"
        [(ngModel)]="filterDate"
        name="filterDate">
    </label>

    <button (click)="applyFilters()">
      Apply
    </button>

    <button
      class="btn-secondary"
      (click)="clearFilters()">

      Clear
    </button>

  </div>

  <!-- =========================
       LOADING / ERROR
  ========================== -->

  <div
    *ngIf="loading"
    class="loading">

    Loading reservations...
  </div>

  <div
    *ngIf="error"
    class="error-msg">

    {{ error }}
  </div>

  <!-- =========================
       TABLE
  ========================== -->

  <table
    *ngIf="
      !loading &&
      reservations.length > 0
    ">

    <thead>

      <tr>

        <th>ID</th>

        <th>Customer</th>

        <th>Email</th>

        <th>Date</th>

        <th>Time</th>

        <th>Guests</th>

        <th>Status</th>

        <th>Actions</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let r of reservations">

        <td>{{ r.id }}</td>

        <!-- USER NAME -->

        <td>
          {{ r.User?.name || ('User #' + r.userId) }}
        </td>

        <!-- USER EMAIL -->

        <td>
          {{ r.User?.email || 'N/A' }}
        </td>

        <td>{{ r.date }}</td>

        <td>{{ r.time }}</td>

        <td>{{ r.guests }}</td>

        <!-- STATUS -->

        <td>

          <select
            [(ngModel)]="r.status"
            [name]="'status' + r.id">

            <option value="pending">
              Pending
            </option>

            <option value="confirmed">
              Confirmed
            </option>

            <option value="cancelled">
              Cancelled
            </option>

          </select>

        </td>

        <!-- ACTIONS -->

        <td>

          <button
            (click)="updateStatus(r)"
            [disabled]="!isDirty(r)">

            Update
          </button>

          <button
            class="btn-danger"
            (click)="deleteReservation(r.id)">

            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

  <!-- =========================
       EMPTY
  ========================== -->

  <p
    *ngIf="
      !loading &&
      !error &&
      reservations.length === 0
    "
    class="empty">

    No reservations found.

  </p>

</div>
