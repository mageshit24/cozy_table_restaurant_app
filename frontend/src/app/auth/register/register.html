<div class="register-container">
  <h2>Create Account</h2>

  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="success">
    {{ successMessage }}
  </div>

  <form (ngSubmit)="register()">

    <label>Full Name</label>
    <input type="text" [(ngModel)]="name" name="name" required placeholder="Enter full name" />

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" required placeholder="Enter email" />

    <label>Phone</label>
    <input type="text" [(ngModel)]="phone" name="phone" required placeholder="Enter 10-digit phone number" />

    <label>Password</label>
    <input type="password" [(ngModel)]="password" name="password" required placeholder="Enter password" />

    <label>Confirm Password</label>
    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
      placeholder="Confirm password" />

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Registering...' : 'Register' }}
    </button>

  </form>

  <p>
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>
</div>
